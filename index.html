<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Brick Attack</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #020617, #0f172a);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      margin: 14px 0 6px;
      color: #22d3ee;
      font-size: 28px;
    }

    .topbar {
      display: flex;
      justify-content: center;
      gap: 24px;
      font-size: 18px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    #gameWrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    canvas {
      background: #0b1220;
      border: 2px solid #22d3ee;
      border-radius: 14px;
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.25);
      max-width: 95vw;
      height: auto;
    }

    .controls {
      margin-top: 14px;
      display: flex;
      justify-content: center;
      gap: 14px;
      padding: 0 16px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 22px;
      font-size: 22px;
      font-weight: bold;
      background: #22d3ee;
      color: #021018;
      min-width: 90px;
    }

    #message {
      margin-top: 12px;
      font-size: 18px;
      min-height: 24px;
      color: #86efac;
      padding: 0 12px 20px;
    }
  </style>
</head>
<body>
  <h1>Brick Attack</h1>

  <div class="topbar">
    <div>Score: <span id="score">0</span></div>
    <div>Lives: <span id="lives">3</span></div>
    <div>Level: <span id="level">1</span></div>
  </div>

  <div id="gameWrap">
    <canvas id="gameCanvas" width="390" height="620"></canvas>
  </div>

  <div class="controls">
    <button id="leftBtn">⬅</button>
    <button id="rightBtn">➡</button>
  </div>

  <div id="message">Break all the bricks.</div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const levelEl = document.getElementById("level");
    const messageEl = document.getElementById("message");

    let score = 0;
    let lives = 3;
    let level = 1;
    let gameOver = false;
    let gameWon = false;

    const paddle = {
      width: 90,
      height: 12,
      x: canvas.width / 2 - 45,
      y: canvas.height - 35,
      speed: 7,
      dx: 0
    };

    const ball = {
      x: canvas.width / 2,
      y: canvas.height - 55,
      radius: 8,
      speed: 4,
      dx: 4,
      dy: -4
    };

    const brick = {
      rows: 5,
      cols: 7,
      width: 45,
      height: 18,
      padding: 8,
      offsetTop: 70,
      offsetLeft: 13
    };

    let bricks = [];

    function buildBricks() {
      bricks = [];
      for (let r = 0; r < brick.rows; r++) {
        bricks[r] = [];
        for (let c = 0; c < brick.cols; c++) {
          bricks[r][c] = {
            x: 0,
            y: 0,
            status: 1
          };
        }
      }
    }

    function resetBall() {
      ball.x = canvas.width / 2;
      ball.y = canvas.height - 55;
      ball.dx = ball.speed * (Math.random() > 0.5 ? 1 : -1);
      ball.dy = -ball.speed;
      paddle.x = canvas.width / 2 - paddle.width / 2;
    }

    function drawPaddle() {
      ctx.beginPath();
      ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 8);
      ctx.fillStyle = "#22d3ee";
      ctx.fill();
      ctx.closePath();
    }

    function drawBall() {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fillStyle = "#34d399";
      ctx.fill();
      ctx.closePath();
    }

    function brickColor(row) {
      const colors = ["#22d3ee", "#34d399", "#facc15", "#fb7185", "#a78bfa"];
      return colors[row % colors.length];
    }

    function drawBricks() {
      for (let r = 0; r < brick.rows; r++) {
        for (let c = 0; c < brick.cols; c++) {
          if (bricks[r][c].status === 1) {
            const brickX = c * (brick.width + brick.padding) + brick.offsetLeft;
            const brickY = r * (brick.height + brick.padding) + brick.offsetTop;
            bricks[r][c].x = brickX;
            bricks[r][c].y = brickY;

            ctx.beginPath();
            ctx.roundRect(brickX, brickY, brick.width, brick.height, 6);
            ctx.fillStyle = brickColor(r);
            ctx.fill();
            ctx.closePath();
          }
        }
      }
    }

    function drawBackgroundGlow() {
      ctx.save();
      ctx.globalAlpha = 0.08;
      for (let i = 0; i < 6; i++) {
        ctx.beginPath();
        ctx.arc(
          Math.random() * canvas.width,
          Math.random() * canvas.height,
          40 + Math.random() * 70,
          0,
          Math.PI * 2
        );
        ctx.fillStyle = "#22d3ee";
        ctx.fill();
      }
      ctx.restore();
    }

    function movePaddle() {
      paddle.x += paddle.dx;

      if (paddle.x < 0) paddle.x = 0;
      if (paddle.x + paddle.width > canvas.width) {
        paddle.x = canvas.width - paddle.width;
      }
    }

    function moveBall() {
      ball.x += ball.dx;
      ball.y += ball.dy;

      if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
        ball.dx *= -1;
      }

      if (ball.y - ball.radius < 0) {
        ball.dy *= -1;
      }

      if (
        ball.y + ball.radius >= paddle.y &&
        ball.x > paddle.x &&
        ball.x < paddle.x + paddle.width &&
        ball.dy > 0
      ) {
        const hitPoint = ball.x - (paddle.x + paddle.width / 2);
        ball.dx = hitPoint * 0.12;
        ball.dy = -Math.abs(ball.dy);
      }

      if (ball.y + ball.radius > canvas.height) {
        lives--;
        livesEl.textContent = lives;

        if (lives <= 0) {
          gameOver = true;
          messageEl.textContent = "Game over. Refresh to play again.";
        } else {
          messageEl.textContent = "You lost a life.";
          resetBall();
        }
      }
    }

    function collisionDetection() {
      let remaining = 0;

      for (let r = 0; r < brick.rows; r++) {
        for (let c = 0; c < brick.cols; c++) {
          const b = bricks[r][c];

          if (b.status === 1) {
            remaining++;

            if (
              ball.x > b.x &&
              ball.x < b.x + brick.width &&
              ball.y > b.y &&
              ball.y < b.y + brick.height
            ) {
              ball.dy *= -1;
              b.status = 0;
              score += 10;
              scoreEl.textContent = score;
              remaining--;
            }
          }
        }
      }

      if (remaining === 0) {
        if (level < 3) {
          level++;
          levelEl.textContent = level;
          ball.speed += 0.7;
          brick.rows += 1;
          buildBricks();
          resetBall();
          messageEl.textContent = "Level " + level + "!";
        } else {
          gameWon = true;
          messageEl.textContent = "You beat Brick Attack!";
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackgroundGlow();
      drawBricks();
      drawPaddle();
      drawBall();

      if (!gameOver && !gameWon) {
        movePaddle();
        moveBall();
        collisionDetection();
        requestAnimationFrame(draw);
      }
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") paddle.dx = -paddle.speed;
      if (e.key === "ArrowRight") paddle.dx = paddle.speed;
    });

    document.addEventListener("keyup", (e) => {
      if (e.key === "ArrowLeft" || e.key === "ArrowRight") paddle.dx = 0;
    });

    function startMoveLeft() {
      paddle.dx = -paddle.speed;
    }

    function startMoveRight() {
      paddle.dx = paddle.speed;
    }

    function stopMove() {
      paddle.dx = 0;
    }

    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");

    leftBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      startMoveLeft();
    });
    leftBtn.addEventListener("touchend", stopMove);
    leftBtn.addEventListener("mousedown", startMoveLeft);
    leftBtn.addEventListener("mouseup", stopMove);
    leftBtn.addEventListener("mouseleave", stopMove);

    rightBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      startMoveRight();
    });
    rightBtn.addEventListener("touchend", stopMove);
    rightBtn.addEventListener("mousedown", startMoveRight);
    rightBtn.addEventListener("mouseup", stopMove);
    rightBtn.addEventListener("mouseleave", stopMove);

    buildBricks();
    resetBall();
    draw();
  </script>
</body>
</html>
