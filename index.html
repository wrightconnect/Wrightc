<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brick Attack</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Brick Attack</h1>

<div id="menu">
<button onclick="startGame()">Start Game</button>
<button onclick="resetProgress()">Reset Progress</button>
</div>

<div id="gameUI">

<div class="topbar">
Score: <span id="score">0</span> |
Coins: <span id="coins">0</span> |
Lives: <span id="lives">3</span> |
Level: <span id="level">1</span>
</div>

<canvas id="gameCanvas" width="360" height="500"></canvas>

<div id="continueScreen" class="hidden">

<h2>No Lives Left</h2>

<button onclick="continueLevel()">Continue (50 Coins)</button>

<button onclick="restartLevel()">Restart Level</button>

</div>

</div>

<script src="game.js"></script>

</body>
</html>
